# nginx-spa.conf
# Sirve el sitio estático Astro generado en la etapa de build.
# try_files garantiza que las rutas de Astro funcionen con refresh directo.
# X-Accel-Buffering off es necesario para el proxy SSE hacia el backend.
#
# Nota de puerto: usa 8080 porque la imagen nginx-unprivileged no puede
# escuchar en puertos por debajo de 1024 sin privilegios de root.

server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;
    absolute_redirect off;
    port_in_redirect off;

    # Assets generados por Astro: nunca deben pasar por el truco de URL
    # porque rutas como /_astro/Layout.hash.css tienen exactamente dos
    # segmentos y el regex de owner/repo las capturaría por error.
    location ^~ /_astro/ {
        try_files $uri =404;
    }

    # Assets estáticos públicos comunes.
    location ~* \.(?:css|js|mjs|png|jpg|jpeg|gif|svg|webp|avif|ico|woff|woff2|xml|txt)$ {
        try_files $uri =404;
    }

    # Truco de URL: /usuario/repo → /analyze?url=https://github.com/usuario/repo
    # Esto permite que sustituir app.example.com por github.com en la barra de
    # direcciones funcione directamente sin extensiones ni herramientas extra.
    location ~ ^/(?!(?:analyze|biblioteca|como-funciona|legal)(?:/|$))([a-zA-Z0-9_.\-]+)/([a-zA-Z0-9_.\-]+)/?$ {
        return 301 /analyze?url=https://github.com/$1/$2;
    }

    location / {
        # Para rutas con extensión .html generadas por Astro (p.ej., /como-funciona.html)
        # y para rutas sin extensión que se resuelven como directorios.
        # Usamos $uri/index.html en vez de $uri/ para evitar que nginx emita
        # un 301 absoluto a :8080 al normalizar la barra final.
        add_header Cache-Control "no-store" always;
        try_files $uri $uri.html $uri/index.html /index.html;
    }

    # Deshabilitar buffer en respuestas de proxy (necesario para SSE)
    proxy_buffering off;

    # ── Cabeceras de seguridad ──────────────────────────────────────────────
    # X-Content-Type-Options: evita que el navegador interprete archivos con
    # un MIME type distinto al declarado (MIME sniffing attacks).
    add_header X-Content-Type-Options "nosniff" always;

    # X-Frame-Options: impide que la página se incruste en un iframe
    # (clickjacking). frame-ancestors 'none' en CSP es más moderno pero
    # se mantiene este header para navegadores sin soporte de CSP.
    add_header X-Frame-Options "DENY" always;

    # Referrer-Policy: envía el origen solo en peticiones same-origin y HTTPS.
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Content-Security-Policy: restringe los orígenes de scripts, estilos,
    # fuentes y conexiones. unsafe-inline es necesario para los estilos scoped
    # de Astro y para el snippet inline de Google Analytics.
    # connect-src incluye la API del backend, la GitHub API (check de SHA) y
    # los endpoints de medición de GA4.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https://www.google-analytics.com https://www.googletagmanager.com; connect-src 'self' https://api.example.com https://api.github.com https://www.google-analytics.com https://region1.google-analytics.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # Strict-Transport-Security: obliga al navegador a usar HTTPS durante 1 año.
    # Solo tiene efecto cuando el sitio se sirve por HTTPS (el proxy inverso
    # lo gestiona, pero la cabecera debe estar presente aquí para propagarse).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Permissions-Policy: deshabilita APIs de hardware innecesarias.
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
}
